# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Test and Build Test Versions

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    name: Check formatting and dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Check Formatting
        run: ./gradlew spotlessCheck --build-cache
      - name: Analyze Dependencies
        run: ./gradlew analyzeDependencies --build-cache
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-build-reports
          path: build/reports/

  unittests:
    name: Build and run unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: ./gradlew test --build-cache
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          annotate_only: true # forked repo cannot write to checks so just do annotations
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unitests-build-reports
          path: build/reports/

  build-dev-image:
    name: Build and push dev Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dev
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  epicstests:
    name: Run all unit tests reliant on EPICS install
    runs-on: ubuntu-latest
    needs: build-dev-image
    container:
      image: ghcr.io/${{ github.repository }}:dev-latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run epics tests
        run: ./gradlew epicsTests --no-daemon --build-cache
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "**/build/test-results/epicsTests/TEST-*.xml"
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epicstests-build-reports
          path: build/reports/

  integrationtests:
    name: Run all unit tests reliant on web and possibly epics
    runs-on: ubuntu-latest
    needs: build-dev-image
    container:
      image: ghcr.io/${{ github.repository }}:dev-latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run integration tests
        run: ./gradlew integrationTests --no-daemon --build-cache
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "**/build/test-results/integrationTests/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrationtests-build-reports
          path: build/reports/

  build-custom-version:
    needs: [unittests, epicstests]
    name: Build Slacdev and Default site version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        siteid: ["slacdev", "default", "tests"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: ./gradlew assemble --build-cache
        env:
          ARCHAPPL_SITEID: ${{ matrix.siteid }}
      - name: Upload package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.siteid }}-package
          path: build/distributions/*.tar.gz

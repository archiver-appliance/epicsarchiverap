name: Verify

on:
  workflow_call:

permissions:
  contents: read
  checks: write

jobs:
  check:
    name: Check formatting and dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - uses: ./.github/actions/setup-java-gradle
      - name: Check Formatting
        run: ./gradlew spotlessCheck
      - name: Analyze Dependencies
        run: ./gradlew analyzeDependencies
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: check-build-reports
          path: build/reports/

  tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build and run unit tests
            task: test
            epics: false
            docker: false
          - name: Run all unit tests reliant on EPICS install
            task: epicsTests
            epics: true
            docker: false
          - name: Run a smoke test to ensure the application starts up correctly in a containerized environment
            task: dockerSmokeTest
            epics: false
            docker: true
          - name: Run all unit tests reliant on web and possibly epics
            task: integrationTests
            epics: true
            docker: false
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up micromamba and EPICS
        if: matrix.epics
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: docker/env.yml
          environment-name: epics
          init-shell: bash
      - name: Set up Docker Buildx
        if: matrix.docker
        uses: docker/setup-buildx-action@v4
      - uses: ./.github/actions/setup-java-gradle
      - name: Run ${{ matrix.task }}
        shell: bash -el {0}
        run: ./gradlew ${{ matrix.task }} --no-daemon
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/${{ matrix.task }}/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.task }}-build-reports
          path: build/reports/

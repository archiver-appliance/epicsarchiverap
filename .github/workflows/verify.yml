name: Verify

on:
  workflow_call:

permissions:
  contents: read
  checks: write

jobs:
  check:
    name: Check formatting and dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Check Formatting
        run: ./gradlew spotlessCheck
      - name: Analyze Dependencies
        run: ./gradlew analyzeDependencies
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: check-build-reports
          path: build/reports/

  unittests:
    name: Build and run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build with Gradle
        run: ./gradlew test
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unitests-build-reports
          path: build/reports/

  epicstests:
    name: Run all unit tests reliant on EPICS install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up micromamba and EPICS
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: docker/env.yml
          environment-name: epics
          init-shell: bash
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run epics tests
        shell: bash -el {0}
        run: ./gradlew epicsTests --no-daemon
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/epicsTests/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: epicstests-build-reports
          path: build/reports/

  integrationtests:
    name: Run all unit tests reliant on web and possibly epics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up micromamba and EPICS
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: docker/env.yml
          environment-name: epics
          init-shell: bash
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run integration tests
        shell: bash -el {0}
        run: ./gradlew integrationTests --no-daemon
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/integrationTests/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integrationtests-build-reports
          path: build/reports/

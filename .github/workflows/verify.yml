name: Verify

on:
  workflow_call:

permissions:
  contents: read
  checks: write

jobs:
  check:
    name: Check formatting and dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Check Formatting
        run: ./gradlew spotlessCheck
      - name: Analyze Dependencies
        run: ./gradlew analyzeDependencies
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: check-build-reports
          path: build/reports/

  unittests:
    name: Build and run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build with Gradle
        run: ./gradlew test
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unitests-build-reports
          path: build/reports/

  epicstests:
    name: Run all unit tests reliant on EPICS install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up micromamba and EPICS
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: docker/env.yml
          environment-name: epics
          init-shell: bash
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run epics tests
        shell: bash -el {0}
        run: ./gradlew epicsTests --no-daemon
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/epicsTests/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: epicstests-build-reports
          path: build/reports/

  dockersmoketest:
    name: Run a smoke test to ensure the application starts up correctly in a containerized environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build smoketest containers
        run: |
          docker compose -f docker/docker-compose.smoketest.yml build
      - name: Run smoketest containers
        run: |
          docker compose -f docker/docker-compose.smoketest.yml up -d
      - name: Wait for archiver to be healthy
        run: |
          for i in $(seq 1 36); do
            if docker compose -f docker/docker-compose.smoketest.yml ps archappl \
                | grep -q "healthy"; then
              echo "Archiver ready"; break
            fi
            if [ "$i" -eq 36 ]; then
              echo "Archiver never became healthy"; exit 1
            fi
            echo "Waiting ($i/36)..."; sleep 5
          done
      - name: Submit PV to be archived
        run: |
          curl -sf \
            "http://localhost:8080/mgmt/bpl/archivePV?pv=IOCtest_0&samplingperiod=1&samplingmethod=MONITOR" \
            -o /dev/null
      - name: Wait for archive workflow to run
        run: sleep 15
      - name: Verify PV is being archived
        run : |
          curl -sf "http://localhost:8080/mgmt/bpl/getPVStatus?pv=IOCtest_0" | grep -q "Being archived"

  integrationtests:
    name: Run all unit tests reliant on web and possibly epics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up micromamba and EPICS
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: docker/env.yml
          environment-name: epics
          init-shell: bash
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run integration tests
        shell: bash -el {0}
        run: ./gradlew integrationTests --no-daemon
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/integrationTests/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integrationtests-build-reports
          path: build/reports/

name: Publish Image

on:
  workflow_call:
    inputs:
      weekly:
        type: boolean
        default: false
        description: "Use weekly tags instead of git-tag-based tags"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_DEFAULT_PLATFORM: linux/amd64

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        imagetag:
          - singletomcat
          - mgmt
          - etl
          - engine
          - retrieval
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract release metadata
        id: meta-release
        if: ${{ !inputs.weekly }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag,prefix=${{ matrix.imagetag }}-
      - name: Extract weekly metadata
        id: meta-weekly
        if: ${{ inputs.weekly }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ matrix.imagetag }}-weekly-latest
            type=schedule,pattern=${{ matrix.imagetag }}-weekly-%Y%m%d
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Get version
        id: get-version
        run: echo "version=$(git describe --tags --always --first-parent)" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          target: ${{ matrix.imagetag }}
          build-args: |
            ARCHAPPL_SITEID=default
            VERSION=${{ steps.get-version.outputs.version }}
          tags: ${{ inputs.weekly && steps.meta-weekly.outputs.tags || steps.meta-release.outputs.tags }}
          labels: ${{ inputs.weekly && steps.meta-weekly.outputs.labels || steps.meta-release.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      task: buildRelease
      site-ids: '["default"]'
    permissions:
      contents: read

  publish-image:
    uses: ./.github/workflows/publish-image.yml
    with:
      nightly: false
    permissions:
      contents: read
      packages: write

  create-prerelease:
    name: Create prerelease
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Download the built artifact
        uses: actions/download-artifact@v8
        with:
          name: default-package
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          prerelease: true
          generate_release_notes: true

name: Docker Tests

on:
  workflow_call:
    inputs:
      use-prebuilt-image:
        type: boolean
        default: false
        description: "Pull dev-image-tag from GHCR instead of building inline"
      image-repository:
        type: string
        default: ""
        description: "Full owner/repo string (required when use-prebuilt-image: true)"
      dev-image-tag:
        type: string
        default: "dev-latest"
        description: "Tag for the dev image to use (required when use-prebuilt-image: true)"

jobs:
  build-dev-image:
    name: Build and push dev Docker image
    runs-on: ubuntu-latest
    if: ${{ !inputs.use-prebuilt-image }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dev
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ inputs.dev-image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  epicstests:
    name: Run all unit tests reliant on EPICS install
    runs-on: ubuntu-latest
    needs: build-dev-image
    container:
      image: ghcr.io/${{ github.repository }}:${{ inputs.dev-image-tag }}
      credentials:
       username: ${{ github.actor }}
       password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run epics tests
        run: ./gradlew epicsTests --no-daemon
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/epicsTests/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: epicstests-build-reports
          path: build/reports/

  integrationtests:
    name: Run all unit tests reliant on web and possibly epics
    runs-on: ubuntu-latest
    needs: build-dev-image
    container:
      image: ghcr.io/${{ github.repository }}:${{ inputs.dev-image-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run integration tests
        run: ./gradlew integrationTests --no-daemon
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/integrationTests/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integrationtests-build-reports
          path: build/reports/
